services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tsm_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - PHP_IDE_CONFIG=serverName=tsm
    depends_on:
      - db
    networks:
      - tsm_network

  webserver:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: tsm_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
    networks:
      - tsm_network

  db:
    image: postgres:16
    container_name: tsm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tsm}
      POSTGRES_USER: ${DB_USERNAME:-tsm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5433:5432"   # mapped to 5433 on host to avoid clashing with your native PG 16.1 on 5432
    volumes:
      - tsm_pgdata:/var/lib/postgresql/data
    networks:
      - tsm_network

  # Optional: lightweight DB admin UI for development convenience.
  # Remove this service entirely for production deployments.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tsm_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@example.com
      PGADMIN_DEFAULT_PASSWORD: changeme
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - tsm_network

networks:
  tsm_network:
    driver: bridge

volumes:
  tsm_pgdata:
    driver: local
