; Opcache configuration
;
; DEV defaults below: validate_timestamps=1 means PHP checks if files changed
; on every request, so editing code shows results immediately without a restart.
;
; FOR PRODUCTION: set opcache.validate_timestamps=0 and run
; `php artisan optimize` after each deploy instead. This is materially faster
; in prod but means you MUST restart php-fpm (or clear opcache) on every
; deploy, since file changes won't be auto-detected. Don't flip this in
; dev - it will make code edits appear to silently not take effect.

opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
