; Custom PHP settings for the test system maintenance platform
; Sized for: bulk CSV/Excel imports (UC-2), PDF/label generation (UC-11, UC-27)

upload_max_filesize = 50M
post_max_size = 55M
memory_limit = 512M
max_execution_time = 120
max_input_time = 120

; Keep timestamps unambiguous regardless of host server locale -
; the application/database should be the source of truth for time zone handling,
; but this avoids PHP-level surprises.
date.timezone = UTC
